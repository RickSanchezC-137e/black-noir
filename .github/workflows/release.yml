name: Release (Windows .exe)

# Tag-driven: push a tag like v0.1.0 -> builds Noir_x.y.z_x64-setup.exe (NSIS) on a
# Windows runner, signs the updater artifact, and publishes a GitHub Release + latest.json.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the Release + upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}

      - name: Install frontend deps
        run: cd desktop && npm install

      - name: Build + sign (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add these in repo Settings -> Secrets and variables -> Actions:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Black Noir ${{ github.ref_name }}"
          releaseBody: "Automated build. Windows installer (NSIS) + updater latest.json."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true   # generates latest.json for the Tauri updater
