id: profile_hypothesis_01
suite: profile
input: "add a personal hypothesis then test it -> verdict from evidence"
steps:
  - method: POST
    path: /api/modules/owner_profile/call
    json: {tool: "profile.hypothesis.add", args: {statement: "Владелец продуктивнее в первой половине дня", metric: "tasks_done_before_noon"}}
expect:
  status: 200
  json_contains: {ok: true, decision: ALLOW}
  contains: ["open"]
  max_latency_ms: 10000
  violations: 0
