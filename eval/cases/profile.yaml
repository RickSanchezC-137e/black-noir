id: profile_observe_recall_01
suite: profile
input: "observe a signal -> recall it via RAG (paraphrased query)"
steps:
  - method: POST
    path: /api/modules/owner_profile/call
    json: {tool: "profile.observe", args: {domain: "habits", key: "productivity", value: "Владелец продуктивнее всего до полудня", confidence: 0.7, source: "chat"}}
    timeout: 40
  - method: POST
    path: /api/modules/owner_profile/call
    json: {tool: "profile.get", args: {query: "когда у владельца пик продуктивности", k: 5}}
    timeout: 40
expect:
  status: 200
  json_contains: {ok: true, decision: ALLOW}
  contains: ["продуктивн"]
  max_latency_ms: 30000
  violations: 0
