id: profile_reconcile_01
suite: profile
input: "reconcile confirms a repeated signal"
steps:
  - method: POST
    path: /api/modules/owner_profile/call
    json: {tool: "profile.observe", args: {domain: "habits", key: "productivity", value: "Владелец продуктивнее всего до полудня", confidence: 0.7}}
  - method: POST
    path: /api/modules/owner_profile/call
    json: {tool: "profile.reconcile", args: {}}
expect:
  status: 200
  json_contains: {ok: true}
  contains: ["confirmed", "superseded"]
  max_latency_ms: 30000
  violations: 0
