id: core_health_01
suite: core
input: "core comes up and reports ok"
request:
  method: GET
  path: /api/core
expect:
  status: 200
  json_contains: {status: ok}
  contains: ["Black Noir", "claude-opus-4-8"]
  max_latency_ms: 2000
  violations: 0
